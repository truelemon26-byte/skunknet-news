name: Sync Categorized SkunkNet News

on:
  schedule:
    # Every 12 hours (UTC)
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: skunknet-news-sync
  cancel-in-progress: true

jobs:
  build-and-parse:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Pin 3.11 — newspaper4k/lxml ship manylinux wheels here (avoid 3.13+ surprises).
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Scraping Framework
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import nltk; nltk.download('punkt_tab'); nltk.download('punkt')"

      - name: Run Extraction Engine
        run: python scripts/scrape_news.py
        # Exit 2 = zero articles; treat as soft failure so the job is red but prior JSON stays.
        continue-on-error: false

      - name: Commit and Push Fresh Matrix
        run: |
          git config user.name "SkunkNet News Bot"
          git config user.email "bot@skunknet.internal"
          git add skunknet_news.json
          if git diff --staged --quiet; then
            echo "No news payload changes."
            exit 0
          fi
          git commit -m "Automated 12-hour SkunkNet news sync"
          git push
